<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE v2.0 - Command Console IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body {
            background-color: #000;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
        }
        .console-tab {
            @apply flex-1 py-3 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 border-b border-zinc-900 transition-all hover:text-zinc-300;
        }
        .console-tab.active {
            @apply text-emerald-500 border-emerald-500 bg-emerald-500/5;
        }
        .nav-link {
            @apply flex items-center gap-3 px-4 py-2 text-[11px] font-bold uppercase tracking-widest text-zinc-500 hover:text-white hover:bg-zinc-900 transition-all rounded-sm;
        }
        .nav-link.active {
            @apply text-zinc-100 bg-zinc-900;
        }
        .card { @apply bg-zinc-950 border border-zinc-900 rounded-sm p-6; }
    </style>
</head>
<body class="flex min-h-screen">
    <!-- COMMAND SIDEBAR -->
    <aside class="w-64 border-r border-zinc-900 flex flex-col sticky top-0 h-screen">
        <!-- 1. SYSTEM IDENTITY -->
        <div class="p-8 border-b border-zinc-900">
            <h1 class="text-xl font-black tracking-tighter italic">SAGE <span class="text-emerald-500">v2.0</span></h1>
        </div>

        <!-- 2. CONSOLE SWITCHER (The Core IA Pivot) -->
        <div class="flex">
            <button class="console-tab active" onclick="switchConsole('portfolio')">Portfolio</button>
            <button class="console-tab" onclick="switchConsole('alpha')">Alpha</button>
        </div>

        <!-- 3. CONTEXTUAL NAVIGATION -->
        <nav class="flex-1 p-6 space-y-1">
            <!-- Portfolio Console Links -->
            <div id="nav-portfolio" class="space-y-1">
                <a href="#" class="nav-link active">Overview</a>
                <a href="#" class="nav-link">Performance</a>
            </div>
            
            <!-- Alpha Console Links (Hidden by default) -->
            <div id="nav-alpha" class="hidden space-y-1">
                <a href="#" class="nav-link">Performance</a>
                <a href="#" class="nav-link">Trade Log</a>
            </div>
        </nav>

        <!-- 4. SETTINGS VAULT (Anchored) -->
        <div class="p-6 border-t border-zinc-900 bg-zinc-950/50">
            <div class="text-[8px] text-zinc-700 font-black uppercase tracking-[0.3em] mb-4">Vault / Settings</div>
            <div class="space-y-1">
                <a href="#" class="nav-link !text-[10px] !text-zinc-600 hover:!text-zinc-300">Accounts</a>
                <a href="#" class="nav-link !text-[10px] !text-zinc-600 hover:!text-zinc-300">Allocation</a>
                <a href="#" class="nav-link !text-[10px] !text-zinc-600 hover:!text-zinc-300">Snapshots</a>
            </div>
        </div>
    </aside>

    <!-- MAIN CONSOLE -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- TOP TOOLBAR -->
        <header class="h-16 border-b border-zinc-900 bg-black flex items-center justify-between px-12 sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <div id="console-indicator" class="px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 text-[9px] font-black uppercase tracking-widest">
                    Portfolio Console
                </div>
                <div class="w-px h-4 bg-zinc-800"></div>
                <div class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Active: Overview</div>
            </div>
            
            <button class="px-8 py-2 bg-zinc-100 text-black text-[10px] font-black uppercase tracking-widest hover:bg-white transition-all shadow-xl">
                [ Sync Data ]
            </button>
        </header>

        <!-- CONTENT -->
        <main class="p-12 space-y-24 max-w-7xl">
            <!-- High-Density Unified Dashboard -->
            <div class="space-y-24">
                <!-- Metrics -->
                <div class="grid grid-cols-4 gap-8">
                    <div class="card"><div class="text-[9px] text-zinc-600 uppercase font-black mb-4">Wealth</div><div class="text-2xl font-black tabular-nums">$1.24M</div></div>
                    <div class="card"><div class="text-[9px] text-zinc-600 uppercase font-black mb-4">Drift</div><div class="text-2xl font-black text-rose-500">+4.2%</div></div>
                    <div class="card"><div class="text-[9px] text-zinc-600 uppercase font-black mb-4">Alpha</div><div class="text-2xl font-black text-emerald-500">+1.82</div></div>
                    <div class="card"><div class="text-[9px] text-zinc-600 uppercase font-black mb-4">Status</div><div class="text-2xl font-black text-zinc-400">NOMINAL</div></div>
                </div>

                <!-- Integrated Holdings (Sankey as Foundation) -->
                <section class="space-y-8">
                    <div class="flex justify-between items-baseline border-b border-zinc-900 pb-4">
                        <h2 class="text-xs font-black uppercase tracking-widest text-zinc-500">Holdings Flow Topology</h2>
                        <span class="text-[9px] text-zinc-700 uppercase font-black tracking-widest italic">Proof of Distributed Capital</span>
                    </div>
                    <div class="h-[500px] border border-dashed border-zinc-900 rounded-sm flex items-center justify-center text-zinc-800 text-[10px] font-black uppercase tracking-[0.5em]">
                        Interactive Sankey (First Class Citizen)
                    </div>
                </section>

                <!-- Next Moves -->
                <section class="space-y-8">
                    <div class="flex justify-between items-baseline border-b border-zinc-900 pb-4">
                        <h2 class="text-xs font-black uppercase tracking-widest text-white">Next Moves</h2>
                    </div>
                    <div class="h-64 bg-zinc-950/50 border border-zinc-900"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        function switchConsole(type) {
            // Update Tabs
            document.querySelectorAll('.console-tab').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Update Nav
            document.getElementById('nav-portfolio').classList.toggle('hidden', type !== 'portfolio');
            document.getElementById('nav-alpha').classList.toggle('hidden', type !== 'alpha');

            // Update Indicator
            const indicator = document.getElementById('console-indicator');
            indicator.innerText = (type === 'portfolio' ? 'Portfolio' : 'Alpha') + ' Console';
            indicator.classList.toggle('text-emerald-500', type === 'portfolio');
            indicator.classList.toggle('border-emerald-500/20', type === 'portfolio');
            indicator.classList.toggle('bg-emerald-500/5', type === 'portfolio');
            indicator.classList.toggle('text-indigo-500', type === 'alpha');
            indicator.classList.toggle('border-indigo-500/20', type === 'alpha');
            indicator.classList.toggle('bg-indigo-500/5', type === 'alpha');
        }
    </script>
</body>
</html>
