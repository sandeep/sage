<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Toolbar Blended Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body {
            background-color: #000;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
        }
        .control-btn {
            @apply px-4 py-1.5 text-[9px] font-black uppercase tracking-widest border border-zinc-800 hover:bg-zinc-900 transition-all flex items-center gap-2;
        }
        .active-panel {
            animation: slideDown 0.3s ease-out forwards;
        }
        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="p-12 space-y-12">
    <!-- DASHBOARD HEADER -->
    <div class="flex justify-between items-end border-b border-zinc-900 pb-8">
        <div>
            <h1 class="text-4xl font-black tracking-tighter italic">
                <span class="text-emerald-500">SAGE</span> V2.0
            </h1>
            <div class="text-[10px] text-zinc-500 uppercase font-black tracking-widest mt-2">Strategic Wealth Forensic</div>
        </div>

        <!-- THE BLENDED MANAGEMENT TOOLBAR -->
        <div class="flex items-center gap-1 bg-zinc-950 p-1 border border-zinc-900 rounded-sm">
            <button class="control-btn bg-emerald-500/10 text-emerald-500 border-emerald-500/20">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                Sync Data
            </button>
            <button class="control-btn text-zinc-400">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" strokeWidth="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/><path stroke-linecap="round" stroke-linejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.001 0 0120.488 9z"/></svg>
                Strategy
            </button>
            <button class="control-btn text-zinc-400">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                History
            </button>
            <div class="w-px h-4 bg-zinc-800 mx-2"></div>
            <button class="control-btn text-zinc-600 hover:text-white border-transparent">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- REVEALED PANEL (Example: Importer) -->
    <div class="active-panel bg-zinc-950 border border-zinc-900 rounded-sm overflow-hidden shadow-2xl">
        <div class="bg-zinc-900/50 px-6 py-3 border-b border-zinc-900 flex justify-between items-center">
            <span class="text-[10px] font-black uppercase tracking-widest text-emerald-500">Active Engine: Portfolio Ingest</span>
            <button class="text-zinc-600 hover:text-white text-xs">×</button>
        </div>
        
        <!-- Nested Importer UI (Simplified) -->
        <div class="p-12 flex flex-col items-center justify-center space-y-6 border-b border-zinc-900 border-dashed border-x-0">
            <div class="w-16 h-16 bg-zinc-900 rounded-full flex items-center justify-center border border-zinc-800">
                <svg class="w-8 h-8 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" strokeWidth="1" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            </div>
            <div class="text-center">
                <p class="text-xs font-black uppercase tracking-[0.2em]">Drop Fidelity CSV</p>
                <p class="text-[9px] text-zinc-500 mt-2">FILE WILL BE VALIDATED BEFORE COMMITMENT</p>
            </div>
        </div>
    </div>

    <!-- REST OF DASHBOARD (Dimmed for Focus) -->
    <div class="opacity-20 pointer-events-none space-y-12">
        <div class="grid grid-cols-3 gap-8">
            <div class="h-32 bg-zinc-900 border border-zinc-800 rounded-sm"></div>
            <div class="h-32 bg-zinc-900 border border-zinc-800 rounded-sm"></div>
            <div class="h-32 bg-zinc-900 border border-zinc-800 rounded-sm"></div>
        </div>
        <div class="h-64 bg-zinc-900 border border-zinc-800 rounded-sm"></div>
    </div>

    <!-- Floating Help / Info -->
    <div class="fixed bottom-12 right-12 text-[9px] text-zinc-700 uppercase font-black tracking-widest bg-black/80 backdrop-blur-sm p-4 border border-zinc-900 rounded-sm">
        Blending integrated toolbar with inline utility panels
    </div>
</body>
</html>
